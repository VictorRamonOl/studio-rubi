<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A1222"/>
      <stop offset="60%" stop-color="#681D31"/>
      <stop offset="100%" stop-color="#742239"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#C89E51" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C89E51" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Decorative gem outline -->
  <g transform="translate(880,170)" opacity="0.18">
    <polygon points="100,10 190,60 190,180 100,230 10,180 10,60" fill="none" stroke="#C89E51" stroke-width="1.5"/>
    <polygon points="100,40 160,72 160,168 100,200 40,168 40,72" fill="none" stroke="#C89E51" stroke-width="1"/>
  </g>
  <!-- Icon: pulse line -->
  <g transform="translate(100,200)" stroke="#C89E51" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="M0 60 L80 60 L100 20 L120 100 L140 40 L160 80 L200 60"/>
  </g>
  <!-- Category label -->
  <text x="100" y="170" font-family="Georgia, serif" font-size="22" fill="#C89E51" letter-spacing="6">CATEGORIA</text>
  <text x="100" y="350" font-family="Georgia, serif" font-size="84" font-weight="700" fill="#F7F4EE">Dor e Lesões</text>
  <text x="100" y="410" font-family="Georgia, serif" font-size="32" fill="#F7F4EE" opacity="0.7">Tratar a causa, não só o sintoma</text>
  <!-- Brand -->
  <g transform="translate(100,540)">
    <text font-family="Georgia, serif" font-size="22" fill="#C89E51" letter-spacing="3">STUDIO RUBI</text>
    <text y="28" font-family="Inter, sans-serif" font-size="14" fill="#F7F4EE" opacity="0.5">Pilates &amp; Fisioterapia · Manaus</text>
  </g>
</svg>
